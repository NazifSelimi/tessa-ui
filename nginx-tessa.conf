server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2 ipv6only=on;
    server_name tessa.mk;

    ssl_certificate /etc/letsencrypt/live/tessa.mk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tessa.mk/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    # -------- Gzip compression --------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # -------- Security headers --------
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # -------- API (Laravel) --------
    location /api {
        rewrite ^/api/(.*)$ /index.php last;
    }

    location ~ ^/index\.php$ {
        root /var/www/tessa-api/public;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/tessa-api/public/index.php;
        include fastcgi_params;
    }

    # -------- Uploaded images (long cache) --------
    location /storage/ {
        alias /var/www/tessa-api/public/storage/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # -------- Frontend (React SPA) --------
    root /var/www/tessa-ui/dist;
    index index.html;

    # Hashed assets — immutable long cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Favicon, robots, manifest — moderate cache
    location ~* \.(png|ico|svg|webmanifest|txt)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # SPA fallback — no cache on index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name tessa.mk;
    return 301 https://tessa.mk$request_uri;
}
